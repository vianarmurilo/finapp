services:
  postgres:
    image: postgres:16-alpine
    container_name: finmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finmind_ai
    volumes:
      - finmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finmind_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finmind-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finmind_ai?schema=public
    ports:
      - "3080:3080"

volumes:
  finmind_pgdata: